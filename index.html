<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 工艺计算平台 V4（半校准版）</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;max-width:1180px;margin:auto;padding:20px;background:#f4f6fb;color:#111}
.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
h1,h2{margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,textarea{padding:12px;border:1px solid #d7dbe3;border-radius:10px;width:100%;box-sizing:border-box;font-size:16px}
button{padding:11px 16px;border:none;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:15px}
.btn2{background:#e9edf4;color:#111}
.hidden{display:none}
.row{display:flex;gap:10px;flex-wrap:wrap}
.big{font-size:28px;font-weight:700}
.muted{color:#666;font-size:14px}
.ok{color:#0a7a33}.warn{color:#b26a00}.bad{color:#c62828}
pre{white-space:pre-wrap;background:#f7f8fb;padding:14px;border-radius:12px}
.tabbar{display:flex;gap:8px;flex-wrap:wrap}
.tab{background:#e9edf4;color:#111}
.tab.active{background:#111;color:#fff}
.kpi{padding:12px;border-radius:12px;background:#f8fafc;border:1px solid #edf1f6}
</style>
</head>
<body>

<div id="login" class="card">
  <h1>WM 工艺计算平台 V4（半校准版）</h1>
  <div class="muted">已整合：缆绳 / 绕丝机（单层、双层、三层）/ 外径反推 / 授权登录 / 历史记录 / 导出 / 半校准模型</div>
  <div class="grid" style="margin-top:14px;">
    <div><input id="pwd" placeholder="输入授权码（默认 WM2026）"></div>
    <div><button onclick="login()">进入系统</button></div>
  </div>
  <div id="loginMsg" class="muted" style="margin-top:10px;"></div>
</div>

<div id="app" class="hidden">

<div class="card">
  <h1>WM 医疗编织 / 缆绳工艺计算平台 V4</h1>
  <div class="tabbar">
    <button class="tab active" onclick="showTab('rope', this)">7×7 缆绳</button>
    <button class="tab" onclick="showTab('coil1', this)">单层绕丝</button>
    <button class="tab" onclick="showTab('coil2', this)">双层绕丝</button>
    <button class="tab" onclick="showTab('coil3', this)">三层绕丝</button>
    <button class="tab" onclick="showTab('reverse', this)">外径反推</button>
    <button class="tab" onclick="showTab('settings', this)">校准设置</button>
  </div>
</div>

<div id="rope" class="card">
  <h2>7×7 缆绳（半校准版）</h2>
  <div class="grid">
    <div><label>单丝直径 d（mm）</label><input id="r_d" value="0.20" type="number" step="0.001"></div>
    <div><label>成品长度 L（m）</label><input id="r_L" value="10" type="number" step="0.01"></div>
    <div><label>损耗预留（%）</label><input id="r_loss" value="5" type="number" step="0.1"></div>
    <div><label>分丝方式</label><select id="r_spool"><option value="49">49管（每根丝独立）</option><option value="7">7组（按七股小股）</option></select></div>
    <div><label>工艺紧度</label><select id="r_tight"><option value="soft">偏松</option><option value="normal" selected>标准</option><option value="tight">偏紧</option></select></div>
    <div><label>小股节距 P1（mm，可选）</label><input id="r_p1" value="10" type="number" step="0.1"></div>
    <div><label>总成缆节距 P2（mm，可选）</label><input id="r_p2" value="28" type="number" step="0.1"></div>
  </div>
  <div class="row" style="margin-top:14px;">
    <button onclick="calcRope()">计算</button>
    <button class="btn2" onclick="fillRope()">示例</button>
  </div>
  <div id="out_rope" style="margin-top:16px;"></div>
</div>

<div id="coil1" class="card hidden">
  <h2>单层绕丝（半校准版）</h2>
  <div class="grid">
    <div><label>芯径（mm）</label><input id="c1_core" value="0.12" type="number" step="0.001"></div>
    <div><label>丝径（mm）</label><input id="c1_wire" value="0.04" type="number" step="0.001"></div>
    <div><label>股数</label><input id="c1_n" value="6" type="number" step="1"></div>
    <div><label>成品长度（m）</label><input id="c1_len" value="5" type="number" step="0.01"></div>
    <div><label>目数（优先）</label><input id="c1_mesh" value="87.5" type="number" step="0.1"></div>
    <div><label>节距（mm，可空）</label><input id="c1_pitch" placeholder="可不填" type="number" step="0.001"></div>
    <div><label>工艺紧度</label><select id="c1_tight"><option value="soft">偏松</option><option value="normal" selected>标准</option><option value="tight">偏紧</option></select></div>
    <div><label>损耗预留（%）</label><input id="c1_loss" value="5" type="number" step="0.1"></div>
  </div>
  <div class="row" style="margin-top:14px;"><button onclick="calcCoil1()">计算</button></div>
  <div id="out_c1" style="margin-top:16px;"></div>
</div>

<div id="coil2" class="card hidden">
  <h2>双层绕丝（半校准版）</h2>
  <div class="grid">
    <div><label>芯径（mm）</label><input id="c2_core" value="0.30" type="number" step="0.001"></div>
    <div><label>第一层丝径（mm）</label><input id="c2_w1" value="0.04" type="number" step="0.001"></div>
    <div><label>第一层股数</label><input id="c2_n1" value="6" type="number" step="1"></div>
    <div><label>第一层目数</label><input id="c2_m1" value="80" type="number" step="0.1"></div>
    <div><label>第二层丝径（mm）</label><input id="c2_w2" value="0.04" type="number" step="0.001"></div>
    <div><label>第二层股数</label><input id="c2_n2" value="6" type="number" step="1"></div>
    <div><label>第二层目数</label><input id="c2_m2" value="75" type="number" step="0.1"></div>
    <div><label>成品长度（m）</label><input id="c2_len" value="10" type="number" step="0.01"></div>
    <div><label>工艺紧度</label><select id="c2_tight"><option value="soft">偏松</option><option value="normal" selected>标准</option><option value="tight">偏紧</option></select></div>
    <div><label>损耗预留（%）</label><input id="c2_loss" value="5" type="number" step="0.1"></div>
  </div>
  <div class="row" style="margin-top:14px;"><button onclick="calcCoil2()">计算</button></div>
  <div id="out_c2" style="margin-top:16px;"></div>
</div>

<div id="coil3" class="card hidden">
  <h2>三层绕丝（半校准版）</h2>
  <div class="grid">
    <div><label>芯径（mm）</label><input id="c3_core" value="0.30" type="number" step="0.001"></div>
    <div><label>第一层丝径（mm）</label><input id="c3_w1" value="0.04" type="number" step="0.001"></div>
    <div><label>第一层股数</label><input id="c3_n1" value="6" type="number" step="1"></div>
    <div><label>第一层目数</label><input id="c3_m1" value="80" type="number" step="0.1"></div>
    <div><label>第二层丝径（mm）</label><input id="c3_w2" value="0.04" type="number" step="0.001"></div>
    <div><label>第二层股数</label><input id="c3_n2" value="6" type="number" step="1"></div>
    <div><label>第二层目数</label><input id="c3_m2" value="75" type="number" step="0.1"></div>
    <div><label>第三层丝径（mm）</label><input id="c3_w3" value="0.03" type="number" step="0.001"></div>
    <div><label>第三层股数</label><input id="c3_n3" value="6" type="number" step="1"></div>
    <div><label>第三层目数</label><input id="c3_m3" value="70" type="number" step="0.1"></div>
    <div><label>成品长度（m）</label><input id="c3_len" value="10" type="number" step="0.01"></div>
    <div><label>工艺紧度</label><select id="c3_tight"><option value="soft">偏松</option><option value="normal" selected>标准</option><option value="tight">偏紧</option></select></div>
    <div><label>损耗预留（%）</label><input id="c3_loss" value="5" type="number" step="0.1"></div>
  </div>
  <div class="row" style="margin-top:14px;"><button onclick="calcCoil3()">计算</button></div>
  <div id="out_c3" style="margin-top:16px;"></div>
</div>

<div id="reverse" class="card hidden">
  <h2>外径反推（增强版）</h2>
  <div class="grid">
    <div><label>结构类型</label><select id="v_type"><option value="rope77">7×7 缆绳</option><option value="coil1">单层绕丝</option><option value="coil2">双层绕丝</option><option value="coil3">三层绕丝</option></select></div>
    <div><label>目标外径 OD（mm）</label><input id="v_od" value="1.48" type="number" step="0.001"></div>
    <div><label>芯径（绕丝用，可空）</label><input id="v_core" value="0.12" type="number" step="0.001"></div>
    <div><label>工艺紧度</label><select id="v_tight"><option value="soft">偏松</option><option value="normal" selected>标准</option><option value="tight">偏紧</option></select></div>
    <div><label>成品长度（m）</label><input id="v_len" value="10" type="number" step="0.01"></div>
    <div><label>损耗预留（%）</label><input id="v_loss" value="5" type="number" step="0.1"></div>
  </div>
  <div class="row" style="margin-top:14px;"><button onclick="calcReverse()">反推</button></div>
  <div id="out_v" style="margin-top:16px;"></div>
</div>

<div id="settings" class="card hidden">
  <h2>校准设置（本地保存）</h2>
  <div class="muted">这部分是给后续真实数据继续喂模型用的。当前已预置“半校准参数”。修改后只保存在当前浏览器。</div>
  <div class="grid" style="margin-top:12px;">
    <div><label>缆绳用丝修正系数</label><input id="s_rope_ratio" value="1.000" type="number" step="0.001"></div>
    <div><label>缆绳外径修正系数</label><input id="s_rope_od" value="1.000" type="number" step="0.001"></div>
    <div><label>绕丝用丝修正系数</label><input id="s_coil_ratio" value="1.000" type="number" step="0.001"></div>
    <div><label>绕丝外径修正系数</label><input id="s_coil_od" value="1.000" type="number" step="0.001"></div>
    <div><label>目数→节距修正系数</label><input id="s_mesh_fix" value="0.620" type="number" step="0.001"></div>
  </div>
  <div class="row" style="margin-top:14px;">
    <button onclick="saveSettings()">保存校准</button>
    <button class="btn2" onclick="resetSettings()">恢复默认</button>
  </div>
</div>

<div class="card">
  <h2>历史记录 / 导出</h2>
  <div class="row">
    <button onclick="copyResult()">复制当前结果</button>
    <button class="btn2" onclick="saveHistory()">保存到历史</button>
    <button class="btn2" onclick="showHistory()">查看历史</button>
    <button class="btn2" onclick="exportTxt()">导出 TXT</button>
  </div>
  <pre id="historyBox" class="hidden"></pre>
</div>

</div>

<script>
const PASSWORD = "WM2026";
let currentText = "";

function login(){
  const p = document.getElementById('pwd').value.trim();
  if(p === PASSWORD){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadSettings();
    calcRope();
  }else{
    document.getElementById('loginMsg').innerHTML = '<span class="bad">授权码错误</span>';
  }
}
function showTab(id, btn){
  ['rope','coil1','coil2','coil3','reverse','settings'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
function helixFactor(radius, pitch){ const c = 2*Math.PI*radius; return Math.sqrt(1 + (c/pitch)**2); }
function tightMul(t){ return t==='soft'?1.03:(t==='tight'?0.97:1.00); }
function tightOdMul(t){ return t==='soft'?1.05:(t==='tight'?0.95:1.00); }

function getS(k, def){ return +(localStorage.getItem(k) || def); }
function saveSettings(){
  ['s_rope_ratio','s_rope_od','s_coil_ratio','s_coil_od','s_mesh_fix'].forEach(id=>localStorage.setItem(id, document.getElementById(id).value));
  alert('校准参数已保存');
}
function resetSettings(){
  localStorage.setItem('s_rope_ratio','1.000');
  localStorage.setItem('s_rope_od','1.000');
  localStorage.setItem('s_coil_ratio','1.000');
  localStorage.setItem('s_coil_od','1.000');
  localStorage.setItem('s_mesh_fix','0.620');
  loadSettings();
  alert('已恢复默认');
}
function loadSettings(){
  document.getElementById('s_rope_ratio').value = getS('s_rope_ratio','1.000').toFixed(3);
  document.getElementById('s_rope_od').value = getS('s_rope_od','1.000').toFixed(3);
  document.getElementById('s_coil_ratio').value = getS('s_coil_ratio','1.000').toFixed(3);
  document.getElementById('s_coil_od').value = getS('s_coil_od','1.000').toFixed(3);
  document.getElementById('s_mesh_fix').value = getS('s_mesh_fix','0.620').toFixed(3);
}
function setOut(id, html, text){ document.getElementById(id).innerHTML = html; currentText = text; }

function judge(val, low, high){
  if(val < low) return '<span class="warn">偏紧 / 偏小</span>';
  if(val > high) return '<span class="warn">偏松 / 偏大</span>';
  return '<span class="ok">正常区间</span>';
}

// 7x7 Rope
function calcRope(){
  const d=+r_d.value, L=+r_L.value, loss=+r_loss.value, spool=+r_spool.value, tight=r_tight.value, p1=+r_p1.value||10, p2=+r_p2.value||28;
  const ropeRatioFix = getS('s_rope_ratio','1.000');
  const ropeOdFix = getS('s_rope_od','1.000');

  const f1 = helixFactor(d, p1);
  const subRatio = 1 + 6*f1;
  const f2 = helixFactor(1.5*d, p2);
  let totalRatio = subRatio * (1 + 6*f2);

  // 半校准：向你当前经验 52 靠拢
  totalRatio = (totalRatio*0.35 + 52.0*0.65) * tightMul(tight) * ropeRatioFix;

  let od = 1.48 * (d/0.2) * tightOdMul(tight) * ropeOdFix;
  const total=L*totalRatio, total2=total*(1+loss/100), per=total/spool, per2=per*(1+loss/100);

  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">用丝比</div><div class="big">1 : ${totalRatio.toFixed(2)}</div></div>
      <div class="kpi"><div class="muted">理论外径</div><div class="big">${od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">总用丝</div><div class="big">${total2.toFixed(2)} m</div></div>
    </div>
    <p>理论总用丝：<b>${total.toFixed(2)} m</b> ｜ 含损耗：<b class="ok">${total2.toFixed(2)} m</b></p>
    <p>每管理论：<b>${per.toFixed(2)} m</b> ｜ 建议每管：<b class="ok">${per2.toFixed(2)} m</b></p>
    <p>现场判断：${judge(od,1.45*(d/0.2),1.50*(d/0.2))}</p>
    <p class="muted">建议：若外径偏大，优先加张力 / 缩节距；若偏小，优先放张力 / 放节距。</p>
  `;
  const text = `[7×7 缆绳]
单丝=${d}mm 成品=${L}m 紧度=${tight}
用丝比≈1:${totalRatio.toFixed(2)}
理论外径≈${od.toFixed(3)}mm
总用丝≈${total.toFixed(2)}m
含损耗≈${total2.toFixed(2)}m
每管建议≈${per2.toFixed(2)}m`;
  setOut('out_rope', html, text);
}

// Coil helpers
function meshToPitch(mesh){
  const fix = getS('s_mesh_fix','0.620'); // 根据你 87.5目≈0.18mm 的基准
  return (25.4 / mesh) * fix;
}
function coilOneLayer(core, wire, n, len, mesh, pitchIn, tight, loss){
  const coilRatioFix = getS('s_coil_ratio','1.000');
  const coilOdFix = getS('s_coil_od','1.000');
  const pitch = pitchIn && pitchIn>0 ? pitchIn : meshToPitch(mesh);
  const pathDia = core + wire;
  let one = Math.sqrt(1 + Math.pow((Math.PI*pathDia)/pitch,2));
  let ratio = one * n * tightMul(tight) * coilRatioFix;
  let od = (core + 2*wire) * tightOdMul(tight) * coilOdFix;
  let total = ratio * len, total2 = total*(1+loss/100), per = total/n, per2 = per*(1+loss/100);
  return {pitch, ratio, od, total, total2, per, per2};
}

function calcCoil1(){
  const core=+c1_core.value, wire=+c1_wire.value, n=+c1_n.value, len=+c1_len.value, mesh=+c1_mesh.value, pitchIn=+c1_pitch.value, tight=c1_tight.value, loss=+c1_loss.value;
  const x = coilOneLayer(core, wire, n, len, mesh, pitchIn, tight, loss);
  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">用丝比</div><div class="big">1 : ${x.ratio.toFixed(2)}</div></div>
      <div class="kpi"><div class="muted">理论外径</div><div class="big">${x.od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">等效节距</div><div class="big">${x.pitch.toFixed(3)} mm</div></div>
    </div>
    <p>理论总用丝：<b>${x.total.toFixed(2)} m</b> ｜ 含损耗：<b class="ok">${x.total2.toFixed(2)} m</b></p>
    <p>每股理论：<b>${x.per.toFixed(2)} m</b> ｜ 建议每股：<b class="ok">${x.per2.toFixed(2)} m</b></p>
    <p>现场判断：${judge(x.pitch,0.16,0.20)}</p>
    <p class="muted">基准参考：0.47 芯径、10股×0.06 时，87.5目稳定节距约 0.18mm。</p>
  `;
  const text = `[单层绕丝]
芯径=${core}mm 丝径=${wire}mm 股数=${n} 长度=${len}m
目数=${mesh} 节距≈${x.pitch.toFixed(3)}mm
用丝比≈1:${x.ratio.toFixed(2)}
理论外径≈${x.od.toFixed(3)}mm
总用丝≈${x.total2.toFixed(2)}m
每股建议≈${x.per2.toFixed(2)}m`;
  setOut('out_c1', html, text);
}

function calcCoil2(){
  const core=+c2_core.value, w1=+c2_w1.value, n1=+c2_n1.value, m1=+c2_m1.value, w2=+c2_w2.value, n2=+c2_n2.value, m2=+c2_m2.value, len=+c2_len.value, tight=c2_tight.value, loss=+c2_loss.value;
  const L1 = coilOneLayer(core, w1, n1, len, m1, 0, tight, 0);
  const core2 = L1.od;
  const L2 = coilOneLayer(core2, w2, n2, len, m2, 0, tight, 0);
  const total = L1.total + L2.total, total2 = total*(1+loss/100), od = L2.od;
  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">总用丝比</div><div class="big">1 : ${(total/len).toFixed(2)}</div></div>
      <div class="kpi"><div class="muted">理论外径</div><div class="big">${od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">总用丝</div><div class="big">${total2.toFixed(2)} m</div></div>
    </div>
    <p>第一层：比值 <b>1:${L1.ratio.toFixed(2)}</b> ｜ 外径 <b>${L1.od.toFixed(3)} mm</b></p>
    <p>第二层：比值 <b>1:${L2.ratio.toFixed(2)}</b> ｜ 外径 <b>${L2.od.toFixed(3)} mm</b></p>
    <p>现场判断：${judge(od, core+2*w1+2*w2-0.02, core+2*w1+2*w2+0.03)}</p>
  `;
  const text = `[双层绕丝]
芯径=${core}mm
第一层=${n1}股×${w1}mm 目数=${m1}
第二层=${n2}股×${w2}mm 目数=${m2}
总用丝比≈1:${(total/len).toFixed(2)}
理论外径≈${od.toFixed(3)}mm
总用丝≈${total2.toFixed(2)}m`;
  setOut('out_c2', html, text);
}

function calcCoil3(){
  const core=+c3_core.value, w1=+c3_w1.value, n1=+c3_n1.value, m1=+c3_m1.value, w2=+c3_w2.value, n2=+c3_n2.value, m2=+c3_m2.value, w3=+c3_w3.value, n3=+c3_n3.value, m3=+c3_m3.value, len=+c3_len.value, tight=c3_tight.value, loss=+c3_loss.value;
  const A = coilOneLayer(core, w1, n1, len, m1, 0, tight, 0);
  const B = coilOneLayer(A.od, w2, n2, len, m2, 0, tight, 0);
  const C = coilOneLayer(B.od, w3, n3, len, m3, 0, tight, 0);
  const total = A.total + B.total + C.total, total2 = total*(1+loss/100), od = C.od;
  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">总用丝比</div><div class="big">1 : ${(total/len).toFixed(2)}</div></div>
      <div class="kpi"><div class="muted">理论外径</div><div class="big">${od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">总用丝</div><div class="big">${total2.toFixed(2)} m</div></div>
    </div>
    <p>第一层外径：<b>${A.od.toFixed(3)} mm</b> ｜ 第二层外径：<b>${B.od.toFixed(3)} mm</b> ｜ 第三层外径：<b>${C.od.toFixed(3)} mm</b></p>
    <p>现场判断：${judge(od, core+2*w1+2*w2+2*w3-0.03, core+2*w1+2*w2+2*w3+0.04)}</p>
  `;
  const text = `[三层绕丝]
芯径=${core}mm
第一层=${n1}股×${w1}mm 目数=${m1}
第二层=${n2}股×${w2}mm 目数=${m2}
第三层=${n3}股×${w3}mm 目数=${m3}
总用丝比≈1:${(total/len).toFixed(2)}
理论外径≈${od.toFixed(3)}mm
总用丝≈${total2.toFixed(2)}m`;
  setOut('out_c3', html, text);
}

function calcReverse(){
  const type=v_type.value, od=+v_od.value, core=+v_core.value, tight=v_tight.value, len=+v_len.value, loss=+v_loss.value;
  let html='', text='';
  if(type==='rope77'){
    const d = 0.2 * (od / (1.48 * tightOdMul(tight) * getS('s_rope_od','1.000')));
    const ratio = 52 * tightMul(tight) * getS('s_rope_ratio','1.000');
    const total = ratio*len, total2=total*(1+loss/100);
    html = `<p class="big">建议单丝直径 ≈ ${d.toFixed(3)} mm</p><p>估算用丝比 ≈ <b>1:${ratio.toFixed(2)}</b></p><p>${len}米总用丝 ≈ <b>${total2.toFixed(2)} m</b></p>`;
    text = `[外径反推-7×7]\n目标OD=${od}mm\n建议单丝≈${d.toFixed(3)}mm\n用丝比≈1:${ratio.toFixed(2)}\n总用丝≈${total2.toFixed(2)}m`;
  }else{
    const layers = type==='coil1'?1:(type==='coil2'?2:3);
    const wire = Math.max((od-core)/(2*layers), 0.01);
    const mesh = 87.5;
    const pitch = meshToPitch(mesh);
    const baseRatio = Math.sqrt(1 + Math.pow((Math.PI*(core+wire))/pitch,2)) * 6 * layers * getS('s_coil_ratio','1.000');
    const total = baseRatio*len, total2=total*(1+loss/100);
    html = `<p class="big">建议丝径 ≈ ${wire.toFixed(3)} mm</p><p>建议股数：每层先按 <b>6股</b> 起步</p><p>建议目数：先按 <b>${mesh}</b> 目试样</p><p>估算总用丝 ≈ <b>${total2.toFixed(2)} m</b></p>`;
    text = `[外径反推-绕丝]\n结构=${type}\n目标OD=${od}mm\n建议丝径≈${wire.toFixed(3)}mm\n建议目数≈${mesh}\n总用丝≈${total2.toFixed(2)}m`;
  }
  setOut('out_v', html, text);
}

function saveHistory(){ if(!currentText){alert('请先计算');return;} const arr=JSON.parse(localStorage.getItem('wm_v4_history')||'[]'); arr.unshift({time:new Date().toLocaleString(),text:currentText}); localStorage.setItem('wm_v4_history', JSON.stringify(arr.slice(0,50))); alert('已保存'); }
function showHistory(){ const arr=JSON.parse(localStorage.getItem('wm_v4_history')||'[]'); const box=document.getElementById('historyBox'); box.classList.remove('hidden'); box.textContent = arr.length?arr.map((x,i)=>`#${i+1} ${x.time}\n${x.text}`).join('\n\n---------------------\n\n'):'暂无历史'; }

  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'WM计算结果.txt'; a.click(); URL.revokeObjectURL(a.href);
}
