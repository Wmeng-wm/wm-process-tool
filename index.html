<script>
// ==========================================
// 授权逻辑（保持不变）
// ==========================================
const VALID_CODES = ["WM-NEIBU", "VIP-001"]; 
let AUTH_DAYS = 365; 
let currentText="";

function checkAuth(){
  const expStr = localStorage.getItem('wm_auth_expire');
  if(expStr){
    const exp = parseInt(expStr, 10);
    if(Date.now() < exp){
      showApp();
      return true;
    }
  }
  return false;
}

function doLogin(){
  const p = document.getElementById('pwd') ? document.getElementById('pwd').value.trim() : "";
  if(VALID_CODES.includes(p)){
    const expMs = Date.now() + AUTH_DAYS * 24 * 3600 * 1000;
    localStorage.setItem('wm_auth_expire', expMs.toString());
    showApp();
  }else{
    alert('授权码错误或已过期');
  }
}

function showApp(){
  document.getElementById('app').classList.remove('hidden');
  const expStr = localStorage.getItem('wm_auth_expire');
  if(expStr){
    const d = new Date(parseInt(expStr, 10));
    document.getElementById('authDateMsg').innerHTML = `授权有效期至：<b class="ok">${d.toLocaleDateString()}</b>`;
  }
  loadSettings();
  calcRope();
}

// ==========================================
// 通用函数
// ==========================================
function showTab(id,btn){
  ['rope','coil1','coil2','coil3','reverse','dense','settings'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function helixFactor(radius,pitch){
  if(pitch === 0) return 1;
  const c=2*Math.PI*radius; return Math.sqrt(1+(c/pitch)**2);
}

function tightMul(t){return t==='soft'?1.03:(t==='tight'?0.97:1.00);}
function tightOdMul(t){return t==='soft'?1.05:(t==='tight'?0.95:1.00);}
function setOut(id,html,text){document.getElementById(id).innerHTML=html; currentText=text;}
function getS(k,def){return +(localStorage.getItem(k)||def);}

// ==========================================
// 【核心修正】密绕捻距计算
// ==========================================
function calcLayerDenseP(n, wire, core, tight){
  const s_dense = getS('s_dense_pitch','1.000');
  let kTight = tight === 'soft' ? 1.035 : (tight === 'tight' ? 0.925 : 0.965);
  const geomFactor = Math.max(0.94, Math.sqrt(1 - Math.pow((n * wire) / (Math.PI * (core + wire)), 2)));
  return n * wire * kTight * geomFactor * s_dense;
}

// ==========================================
// 7×7缆绳（保持不变）
// ==========================================
function calcRope(){
  // ...（你的原calcRope函数完全不变，这里省略以节省篇幅，实际使用时请保留原函数）
  const d=+document.getElementById('r_d').value, L=+document.getElementById('r_L').value, loss=+document.getElementById('r_loss').value, spool=+document.getElementById('r_spool').value, rpm=+document.getElementById('r_rpm').value,
        p1=+document.getElementById('r_p1').value||20, p2=+document.getElementById('r_p2').value||5, p3=+document.getElementById('r_p3').value||6,
        dir1=document.getElementById('r_dir1').value, dir2=document.getElementById('r_dir2').value, dir3=document.getElementById('r_dir3').value,
        tight=document.getElementById('r_tight').value;

  const ropeRatioFix=getS('s_rope_ratio','1.000'), ropeOdFix=getS('s_rope_od','1.000'), ropeSpeedFix=getS('s_rope_speed','1.000');

  const K_inner = 0.6; const K_outer = 0.5; const K_cable = 0.4;
  const h_inner = helixFactor(d * K_inner, p1);
  const ratio_core_strand = 1 + 6 * h_inner;
  const h_outer = helixFactor(d * K_outer, p2);
  const ratio_outer_strand = 1 + 6 * h_outer;
  const strandPathRadius = 3 * d * K_cable; 
  const h_cable = helixFactor(strandPathRadius, p3);

  let totalRatio = ratio_core_strand + 6 * (ratio_outer_strand * h_cable);
  totalRatio = totalRatio * tightMul(tight) * ropeRatioFix;
  const avgWireRatio = totalRatio / 49;
  const maxWireRatio = (h_outer * h_cable) * tightMul(tight) * ropeRatioFix;

  let speedMM = rpm * p1 * ropeSpeedFix;
  let od = 9 * d * tightOdMul(tight) * ropeOdFix;

  const total = L * totalRatio;
  const total2 = total * (1 + loss/100);
  
  let per2 = 0, perText = '';
  if (spool == 49) {
    per2 = L * maxWireRatio * (1 + loss/100);
    perText = '按最长单丝消耗备料';
  } else {
    per2 = L * (ratio_outer_strand * h_cable) * tightMul(tight) * ropeRatioFix * (1 + loss/100);
    perText = '按外侧股总消耗备料';
  }

function coilLayerByPitch(coreDia,wireDia,n,pitch,len,tight,loss,onoff='ON'){
  if(onoff==='OFF')return{ratio:0,od:coreDia,total:0,total2:0,per:0,per2:0,pitch:pitch}; 
  const coilRatioFix=getS('s_coil_ratio','1.000'),coilOdFix=getS('s_coil_od','1.000'); 
  const pathDia=coreDia+wireDia;
  const one=Math.sqrt(1+Math.pow((Math.PI*pathDia)/pitch,2));
  const ratio=one*n*tightMul(tight)*coilRatioFix;
  const od=(coreDia+2*wireDia)*tightOdMul(tight)*coilOdFix;
  const total=ratio*len,total2=total*(1+loss/100),per=n>0?total/n:0,per2=n>0?total2/n:0; 
  return{ratio,od,total,total2,per,per2,pitch};
}

// 密绕专门计算（已全面优化）
function calcDense(){
  const core = +document.getElementById('d_core').value;
  const wire = +document.getElementById('d_wire').value;
  const n = Math.max(1, +document.getElementById('d_n').value);
  const len = +document.getElementById('d_len').value;
  const mode = document.getElementById('d_mode').value;
  const loss = +document.getElementById('d_loss').value;
  const goal = document.getElementById('d_goal').value;
  const profile = document.getElementById('d_profile').value;
  const denseFix = getS('s_dense_pitch','1.000');
  const coilRatioFix = getS('s_coil_ratio','1.000');
  const coilOdFix = getS('s_coil_od','1.000');

  let p_use = 0, p_limit = 0, p_start = 0, p_stable = 0;
  let ratio = 0, od = 0, note = '';

  if(profile === 'multi'){
    const kTight = mode==='soft' ? 1.04 : (mode==='tight' ? 0.91 : 0.96);
    const geom = Math.max(0.94, Math.sqrt(1 - Math.pow((n*wire)/(Math.PI*(core+wire)), 2)));
    
    p_start  = n * wire * 1.02 * geom * denseFix;
    p_stable = n * wire * kTight * geom * denseFix;
    p_limit  = n * wire * 0.89 * geom * denseFix;

    p_use = goal==='limit' ? p_limit : (goal==='start' ? p_start : p_stable);

    const pathDia = core + wire;
    const one = Math.sqrt(1 + Math.pow((Math.PI * pathDia) / p_use, 2));
    ratio = one * n * coilRatioFix;
    od = (core + 2*wire) * tightOdMul(mode) * coilOdFix;
    note = '多股并列密绕 - 几何修正版';
  } else {
    const kTight = mode==='soft' ? 1.04 : (mode==='tight' ? 0.90 : 0.96);
    p_start  = wire * 1.05 * denseFix;
    p_stable = wire * kTight * denseFix;
    p_limit  = wire * 0.82 * denseFix;
    p_use = goal==='limit' ? p_limit : (goal==='start' ? p_start : p_stable);

    const pathDia = core + wire;
    const one = Math.sqrt(1 + Math.pow((Math.PI * pathDia) / p_use, 2));
    ratio = one * n * tightMul(mode) * coilRatioFix;
    od = (core + 2*wire) * tightOdMul(mode) * coilOdFix;
    note = '常规单层螺旋密绕';
  }

  const total = ratio * len;
  const total2 = total * (1 + loss/100);
  const per2 = total2 / n;
  const perRatio = n > 0 ? (ratio / n) : 0;

  const html = `
  <div class="grid">
    <div class="kpi"><div class="muted">推荐密绕捻距（稳定）</div><div class="big">${p_use.toFixed(4)} mm</div></div>
    <div class="kpi"><div class="muted">建议试样范围</div><div class="big">${(p_use*0.96).toFixed(4)} ~ ${(p_use*1.05).toFixed(4)} mm</div></div>
    <div class="kpi"><div class="muted">理论外径</div><div class="big">${od.toFixed(3)} mm</div></div>
    <div class="kpi"><div class="muted">单股用丝比</div><div class="big">1 : ${perRatio.toFixed(3)}</div></div>
  </div>
  <hr>
  <p>极限：<b>${p_limit.toFixed(4)}</b>｜起始：<b>${p_start.toFixed(4)}</b>｜稳定：<b>${p_stable.toFixed(4)}</b> mm</p>
  <p>含损耗总用丝：<b class="ok">${total2.toFixed(2)} m</b>　每股建议：<b class="ok">${per2.toFixed(2)} m</b></p>
  <p class="muted">${note}</p>`;

  setOut('out_dense', html, `[密绕] 推荐捻距 ${p_use.toFixed(4)}mm`);
}
