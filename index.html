<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>绕丝工艺计算平台 V4.62</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;
  max-width:1220px;margin:auto;padding:20px;background:#f4f6fb;color:#111
}
.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
h1,h2{margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,textarea{
  padding:12px;border:1px solid #d7dbe3;border-radius:10px;width:100%;box-sizing:border-box;font-size:16px
}
button{
  padding:11px 16px;border:none;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:15px
}
.btn2{background:#e9edf4;color:#111}
.hidden{display:none}
.row{display:flex;gap:10px;flex-wrap:wrap}
.big{font-size:28px;font-weight:700}
.muted{color:#666;font-size:14px}
.ok{color:#0a7a33}.warn{color:#b26a00}.bad{color:#c62828}
pre{white-space:pre-wrap;background:#f7f8fb;padding:14px;border-radius:12px}
.tabbar{display:flex;gap:8px;flex-wrap:wrap}
.tab{background:#e9edf4;color:#111}
.tab.active{background:#111;color:#fff}
.kpi{padding:12px;border-radius:12px;background:#f8fafc;border:1px solid #edf1f6}
label{font-size:14px;color:#444;display:block;margin-bottom:6px}
.small{font-size:13px;color:#666}
hr{border:none;border-top:1px solid #edf1f6;margin:14px 0}
.layer-title {font-weight:600; color:#111; background:#e9edf4; padding:6px 12px; border-radius:6px; display:inline-block; margin-bottom:8px; font-size:14px;}
</style>
</head>
<body>

<div id="app">
  <div class="card">
    <h1>医疗编织 / 缆绳 / 绕丝工艺计算平台</h1>
    <div class="row" style="justify-content: space-between; align-items: center;">
      <div class="muted">绕丝工艺 · 医疗编织参数辅助工具 V4.62</div>
    </div>
    <div class="tabbar" style="margin-top:12px;">
      <button class="tab active" onclick="showTab('rope', this)">7×7 缆绳</button>
      <button class="tab" onclick="showTab('coil1', this)">单层绕丝</button>
      <button class="tab" onclick="showTab('coil2', this)">双层绕丝</button>
      <button class="tab" onclick="showTab('coil3', this)">三层绕丝</button>
      <button class="tab" onclick="showTab('reverse', this)">外径反推</button>
      <button class="tab" onclick="showTab('dense', this)">密绕专门计算</button>
      <button class="tab" onclick="showTab('settings', this)">校准设置</button>
    </div>
  </div>

  <!-- 7×7缆绳 -->
  <div id="rope" class="card">
    <h2>7×7 缆绳</h2>
    <div class="small">已加入张力与变形折减系数</div>
    <div class="grid" style="margin-top:12px;">
      <div><label>单丝直径 d（mm）</label><input id="r_d" value="0.20" type="number" step="0.001"></div>
      <div><label>成品长度 L（m）</label><input id="r_L" value="200" type="number" step="0.01"></div>
      <div><label>损耗预留（%）</label><input id="r_loss" value="5" type="number" step="0.1"></div>
      <div><label>分丝方式</label><select id="r_spool"><option value="49">49管（每根丝独立）</option><option value="7">7组（按七股小股）</option></select></div>
      <div><label>主机转速 RPM</label><input id="r_rpm" value="30" type="number" step="0.1"></div>
      <div><label>内层捻距 P1（mm）</label><input id="r_p1" value="20" type="number" step="0.001"></div>
      <div><label>内层捻向</label><select id="r_dir1"><option value="Z" selected>Z捻</option><option value="S">S捻</option></select></div>
      <div><label>外层捻距 P2（mm）</label><input id="r_p2" value="5" type="number" step="0.001"></div>
      <div><label>外层捻向</label><select id="r_dir2"><option value="Z">Z捻</option><option value="S" selected>S捻</option></select></div>
      <div><label>7×7 总捻距 P3（mm）</label><input id="r_p3" value="6" type="number" step="0.001"></div>

<script>
// ====================== 无授权直接进入 ======================
let currentText = "";

function showTab(id, btn) {
  ['rope','coil1','coil2','coil3','reverse','dense','settings'].forEach(x => {
    const el = document.getElementById(x);
    if (el) el.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function helixFactor(radius, pitch) {
  if (pitch === 0) return 1;
  const c = 2 * Math.PI * radius;
  return Math.sqrt(1 + (c / pitch) ** 2);
}

function tightMul(t) { return t === 'soft' ? 1.03 : (t === 'tight' ? 0.97 : 1.00); }
function tightOdMul(t) { return t === 'soft' ? 1.05 : (t === 'tight' ? 0.95 : 1.00); }
function setOut(id, html, text) {
  document.getElementById(id).innerHTML = html;
  currentText = text || html;
}
function getS(k, def) { return +(localStorage.getItem(k) || def); }

// ====================== 密绕修正核心函数 ======================
function calcLayerDenseP(n, wire, core, tight) {
  const s_dense = getS('s_dense_pitch', '1.000');
  let kTight = tight === 'soft' ? 1.035 : (tight === 'tight' ? 0.925 : 0.965);
  const geomFactor = Math.max(0.94, Math.sqrt(1 - Math.pow((n * wire) / (Math.PI * (core + wire)), 2)));
  return n * wire * kTight * geomFactor * s_dense;
}

// ====================== 7×7缆绳 ======================
function calcRope() {
  const d = +document.getElementById('r_d').value || 0.2;
  const L = +document.getElementById('r_L').value || 200;
  const loss = +document.getElementById('r_loss').value || 5;
  const spool = +document.getElementById('r_spool').value || 49;
  const rpm = +document.getElementById('r_rpm').value || 30;
  const p1 = +document.getElementById('r_p1').value || 20;
  const p2 = +document.getElementById('r_p2').value || 5;
  const p3 = +document.getElementById('r_p3').value || 6;
  const tight = document.getElementById('r_tight').value;

  const ropeRatioFix = getS('s_rope_ratio', '1.000');
  const ropeOdFix = getS('s_rope_od', '1.000');
  const ropeSpeedFix = getS('s_rope_speed', '1.000');

  const K_inner = 0.6, K_outer = 0.5, K_cable = 0.4;
  const h_inner = helixFactor(d * K_inner, p1);
  const ratio_core_strand = 1 + 6 * h_inner;
  const h_outer = helixFactor(d * K_outer, p2);
  const ratio_outer_strand = 1 + 6 * h_outer;
  const strandPathRadius = 3 * d * K_cable;
  const h_cable = helixFactor(strandPathRadius, p3);

  let totalRatio = ratio_core_strand + 6 * (ratio_outer_strand * h_cable);
  totalRatio = totalRatio * tightMul(tight) * ropeRatioFix;
  const avgWireRatio = totalRatio / 49;
  const maxWireRatio = (h_outer * h_cable) * tightMul(tight) * ropeRatioFix;

  const speedMM = rpm * p1 * ropeSpeedFix;
  const od = 9 * d * tightOdMul(tight) * ropeOdFix;

  const total = L * totalRatio;
  const total2 = total * (1 + loss / 100);
  let per2 = 0, perText = '';
  if (spool === 49) {
    per2 = L * maxWireRatio * (1 + loss / 100);
    perText = '最长单丝';
  } else {
    per2 = L * (ratio_outer_strand * h_cable) * tightMul(tight) * ropeRatioFix * (1 + loss / 100);
    perText = '外侧股';
  }

  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">平均单股用丝比</div><div class="big">1 : ${avgWireRatio.toFixed(3)}</div></div>
      <div class="kpi" style="background:#fff4f4;border:1px solid #ffdcdc"><div class="muted">最长单丝用丝比</div><div class="big" style="color:#c62828">1 : ${maxWireRatio.toFixed(3)}</div></div>
      <div class="kpi"><div class="muted">总用丝比</div><div class="big">1 : ${totalRatio.toFixed(2)}</div></div>
    </div>
    <hr>
    <div class="grid">
      <div class="kpi"><div class="muted">估算外径</div><div class="big">${od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">机台效率</div><div class="big" style="color:#0a7a33">${speedMM.toFixed(1)} mm/min</div></div>
    </div>
    <p>含损耗总用丝：<b class="ok">${total2.toFixed(2)} m</b></p>
    <p>单管/组建议备料（${perText}）： <b class="bad">${per2.toFixed(2)} m</b></p>`;

  setOut('out_rope', html, `[7×7缆绳] 总比${totalRatio.toFixed(2)} 外径${od.toFixed(3)}mm`);
}

function fillRope() {
  document.getElementById('r_d').value = 0.20;
  document.getElementById('r_L').value = 200;

// ====================== 绕丝计算 ======================
function coilLayerByPitch(coreDia, wireDia, n, pitch, len, tight, loss, onoff = 'ON') {
  if (onoff === 'OFF') return {ratio:0, od:coreDia, total:0, total2:0, per:0, per2:0, pitch};
  const coilRatioFix = getS('s_coil_ratio','1.000');
  const coilOdFix = getS('s_coil_od','1.000');
  const pathDia = coreDia + wireDia;
  const one = Math.sqrt(1 + Math.pow((Math.PI * pathDia) / pitch, 2));
  const ratio = one * n * tightMul(tight) * coilRatioFix;
  const od = (coreDia + 2 * wireDia) * tightOdMul(tight) * coilOdFix;
  const total = ratio * len;
  const total2 = total * (1 + loss / 100);
  const per2 = n > 0 ? total2 / n : 0;
  const perRatio = n > 0 ? ratio / n : 0;
  return {ratio, od, total2, per2, perRatio, pitch};
}

function calcCoil1() {
  const core = +document.getElementById('c1_core').value;
  const wire = +document.getElementById('c1_wire').value;
  const n = +document.getElementById('c1_n').value;

// ====================== 密绕专门计算 ======================
function calcDense() {
  const core = +document.getElementById('d_core').value;
  const wire = +document.getElementById('d_wire').value;
  const n = Math.max(1, +document.getElementById('d_n').value);
  const len = +document.getElementById('d_len').value;
  const mode = document.getElementById('d_mode').value;
  const loss = +document.getElementById('d_loss').value;
  const goal = document.getElementById('d_goal').value;
  const profile = document.getElementById('d_profile').value;
  const denseFix = getS('s_dense_pitch','1.000');

  let p_use = 0, p_limit = 0, p_start = 0, p_stable = 0, note = '';
  let ratio = 0, od = (core + 2*wire) * tightOdMul(mode);

  if (profile === 'multi') {
    const geom = Math.max(0.94, Math.sqrt(1 - Math.pow((n*wire)/(Math.PI*(core+wire)), 2)));
    p_start = n * wire * 1.02 * geom * denseFix;
    p_stable = n * wire * (mode==='soft'?1.04:(mode==='tight'?0.91:0.96)) * geom * denseFix;
    p_limit = n * wire * 0.89 * geom * denseFix;
    p_use = goal==='limit' ? p_limit : (goal==='start' ? p_start : p_stable);
    note = '多股并列密绕 - 几何修正版';
  } else {
    p_stable = wire * (mode==='soft'?1.04:(mode==='tight'?0.90:0.96)) * denseFix;
    p_use = p_stable;
    note = '单层螺旋密绕';
  }

  ratio = n * Math.sqrt(1 + Math.pow(Math.PI * (core + wire) / p_use, 2));
  const total2 = ratio * len * (1 + loss/100);
  const per2 = total2 / n;
  const perRatio = ratio / n;

  const html = `
    <div class="grid">
      <div class="kpi"><div class="muted">推荐密绕捻距</div><div class="big">${p_use.toFixed(4)} mm</div></div>
      <div class="kpi"><div class="muted">理论外径</div><div class="big">${od.toFixed(3)} mm</div></div>
      <div class="kpi"><div class="muted">单股用丝比</div><div class="big">1 : ${perRatio.toFixed(3)}</div></div>
    </div>
    <p>含损耗总用丝：<b class="ok">${total2.toFixed(2)} m</b>　每股建议：<b class="ok">${per2.toFixed(2)} m</b></p>
    <p class="muted">${note}</p>`;
  setOut('out_dense', html);
}

  document.getElementById('d_core').value = 0.12;

  document.getElementById('d_mode').value = 'normal';
  document.getElementById('d_profile').value = 'multi';
  document.getElementById('d_goal').value = 'stable';
  calcDense();
}
